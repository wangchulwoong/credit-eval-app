<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건설사 여신한도 평가 시스템</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 16px; padding: 48px 40px; width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-icon { width: 56px; height: 56px; background: #1e3a5f; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 24px; }
  .logo h1 { font-size: 18px; font-weight: 600; color: #1e3a5f; }
  .logo p { font-size: 12px; color: #888; margin-top: 4px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 500; color: #333; margin-bottom: 6px; }
  input[type=text], input[type=password] { width: 100%; padding: 11px 14px; border: 1px solid #dde1e7; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #1e3a5f; }
  .btn { width: 100%; padding: 12px; background: #1e3a5f; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
  .btn:hover { background: #2d5282; }
  .error { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #cc0000; margin-bottom: 16px; }
  .footer { text-align: center; margin-top: 20px; font-size: 11px; color: #bbb; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏗️</div>
    <h1>건설사 여신한도 평가 시스템</h1>
    <p>Construction Credit Evaluation System</p>
  </div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label>아이디</label>
      <input type="text" name="username" placeholder="아이디를 입력하세요" autofocus required>
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
    </div>
    <button type="submit" class="btn">로그인</button>
  </form>
  <div class="footer">초기 관리자 계정: admin / admin1234</div>
</div>
</body>
</html>
